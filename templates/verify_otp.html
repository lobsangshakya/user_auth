<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP</title>
    <style>
        body { font-family: Arial; max-width: 400px; margin: 50px auto; padding: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; cursor: pointer; }
        button:hover { background: #218838; }
        .messages { color: red; margin-bottom: 10px; }
        .info { background: #e7f3ff; padding: 10px; border-radius: 5px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <h2>Verify Your Email</h2>
    
    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        </div>
    {% endif %}
    
    <div class="info">
        We've sent a 6-digit OTP code to your email. It's valid for 5 minutes.
    </div>
    
    <form method="POST">
        {% csrf_token %}
        <input type="text" name="otp" placeholder="Enter 6-digit OTP" maxlength="6" required>
        <button type="submit">Verify OTP</button>
    </form>
</body>
</html>
