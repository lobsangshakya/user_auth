{% extends "base.html" %}

{% block title %}Verify OTP | Minimal Auth{% endblock %}
{% block header %}Verify Your Account{% endblock %}

{% block content %}
<form method="post">
    {% csrf_token %}
    <input type="text" name="code" placeholder="Enter OTP (6 digits)" maxlength="6" required>
    <button type="submit">Verify</button>
</form>
<p class="link-text"><a href="{% url 'signup' %}">Back to Signup</a></p>
{% endblock %}
